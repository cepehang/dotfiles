# =============================================
# TMUX Configuration
# =============================================

# ---------------------------------------------
# Prefix (Leader Key)
# ---------------------------------------------
# Primary prefix: C-a (GNU Screen style, no LazyVim conflict)
# Note: Press C-a twice (C-a C-a) to send actual C-a to shell (beginning of line)
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------
# Basic Settings (tmux-sensible inspired)
# ---------------------------------------------

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on

# Increase history limit
set -g history-limit 50000

# Faster command sequence (no delay after prefix)
set -sg escape-time 0

# Faster key repetition
set -g repeat-time 600

# Focus events for neovim and other apps
set -g focus-events on

# Aggressive resize for shared sessions
setw -g aggressive-resize on

# Allow modified enter
set -g extended-keys on
set -g extended-keys-format csi-u

# ---------------------------------------------
# Window & Pane Management
# ---------------------------------------------

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Automatic window renaming
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ---------------------------------------------
# Key Bindings (Vim-style)
# ---------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes with intuitive keys
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1



# Restore clear screen with prefix + C-l
bind C-l send-keys 'C-l'

# ---------------------------------------------
# Copy Mode (Vim-style)
# ---------------------------------------------
setw -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------
# Neovim Integration
# ---------------------------------------------

# Smart pane switching with awareness of Neovim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Keep kill until end of line
bind C-k send-keys 'C-k'

# ---------------------------------------------
# TPM (Tmux Plugin Manager) & Plugins
# ---------------------------------------------

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ---------------------------------------------
# Catppuccin Theme Configuration
# ---------------------------------------------

# Window appearance
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text "#{?window_zoomed_flag,#[bg=#ed8796 fg=#24273a bold] 󰊓 #[bg=default fg=default nobold],} #W"

run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

# ---------------------------------------------
# Plugin Settings
# ---------------------------------------------

# tmux-yank: integrate with system clipboard
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# tmux-resurrect: save/restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save/restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ---------------------------------------------
# Initialize TPM
# ---------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'
